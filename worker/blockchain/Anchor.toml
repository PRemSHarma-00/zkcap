[profile.dev]
solana_version = "1.18.12"

[profile.release]
solana_version = "1.18.12"
lto = true
codegen-units = 1
opt-level = 3
overflow-checks = true

[programs.devnet]
zkcap_attestation = "ZkCAPxyz123456789abcdefghijklmnopqrstuvwxyz"

[programs.testnet]
zkcap_attestation = "ZkCAPxyz123456789abcdefghijklmnopqrstuvwxyz"

[programs.mainnet]
zkcap_attestation = "ZkCAPxyz123456789abcdefghijklmnopqrstuvwxyz"

[registry]
url = "https://anchor.projectserum.com"

[provider]
cluster = "Devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha --timeout 1000000 tests/**/*.ts"
